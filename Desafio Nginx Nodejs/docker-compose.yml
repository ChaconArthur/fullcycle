version: '3.8'

services:
  db:
    image: mysql:5.7
    command: --innodb-use-native-aio=0
    container_name: mysql-db
    restart: always
    tty: true
    volumes:
      - ./dbdata:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=app_db
      - MYSQL_ROOT_PASSWORD=root
    networks:
      - fullcycle-network

  app:
    build:
      context: ./node
      dockerfile: Dockerfile
    container_name: node-app
    depends_on:
      - db
    entrypoint: [ "dockerize", "-wait", "tcp://db:3306", "-timeout", "40s", "npm", "start" ]
    tty: true
    volumes:
      - ./node/app:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - fullcycle-network

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks:
      - fullcycle-network

networks:
  fullcycle-network:
    driver: bridge
